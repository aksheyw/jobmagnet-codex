services:
  jobmagnet-codex:
    build: .
    image: jobmagnet-codex:latest
    container_name: jobmagnet-codex
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
    env_file:
      - /root/.jobmagnet/env
    volumes:
      - /root/.codex:/root/.codex:ro
      - /root/.jobmagnet/secret:/root/.jobmagnet/secret:ro
      - /var/jobmagnet/jobs:/var/jobmagnet/jobs:rw
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8443/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
